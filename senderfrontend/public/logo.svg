<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1F2937;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background gradient rounded square -->
  <rect x="0" y="0" width="256" height="256" rx="40" fill="url(#grad1)"/>
  
  <!-- Mail icon (envelope) -->
  <g transform="translate(64, 80)">
    <!-- Outer envelope -->
    <rect x="0" y="0" width="128" height="96" rx="8" stroke="white" stroke-width="6" fill="none"/>
    
    <!-- Top flap -->
    <path d="M 0 0 L 64 50 L 128 0" stroke="white" stroke-width="6" fill="none" stroke-linejoin="round"/>
    
    <!-- Inner lines -->
    <line x1="0" y1="0" x2="64" y2="50" stroke="white" stroke-width="6"/>
    <line x1="128" y1="0" x2="64" y2="50" stroke="white" stroke-width="6"/>
  </g>
</svg>
